<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title>المفاجأة المطورة - نسخة الإثارة</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 2px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            border-radius: 15px;
            width: 400px;
            transition: all 0.3s;
        }
        
        input {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 24px;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            width: 80%;
            outline: none;
            border-radius: 5px;
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0% {
                transform: translate(1px, 1px) rotate(0deg);
            }
            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }
            30% {
                transform: translate(3px, 2px) rotate(0deg);
            }
            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }
            100% {
                transform: translate(1px, 1px) rotate(0deg);
            }
        }
        
        h1 {
            margin: 0;
            font-size: 2em;
        }
        
        p {
            color: #888;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div class="content" id="box">
        <h1 id="title">نظام غامض V2.0</h1>
        <p id="msg">اكتب الكلمة السرية واضغط Enter</p>
        <input type="text" id="secret-input" placeholder="اكتب هنا..." autocomplete="off">
    </div>

    <script>
        // تأثير الماتريكس
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0101010101010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        let matrixColor = "#0f0";

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = matrixColor;
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 33);

        // نظام الأوامر مع زر الإنتر
        const input = document.getElementById('secret-input');
        const box = document.getElementById('box');
        const title = document.getElementById('title');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = input.value.toLowerCase().trim();
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 500);

                if (val === 'fire') {
                    matrixColor = "#ff4500";
                    title.innerText = "وضع النيران 🔥";
                    document.body.style.boxShadow = "inset 0 0 100px #ff4500";
                } else if (val === 'hacker') {
                    matrixColor = "#00ffff";
                    title.innerText = "تم الاختراق 💻";
                    box.style.borderColor = "#00ffff";
                } else if (val === 'play') {
                    title.innerText = "جاري فتح البوابة...";
                    setTimeout(() => window.location.href = "https://poki.com", 1000);
                } else if (val === 'ghost') {
                    matrixColor = "#ffffff";
                    title.innerText = "شبح النظام 👻";
                    box.style.opacity = "0.5";
                } else {
                    title.innerText = "كود خاطئ!";
                    setTimeout(() => title.innerText = "نظام غامض V2.0", 2000);
                }
                input.value = ""; // مسح النص بعد الضغط على إنتر
            }
        });
    </script>
</body>

</html>
